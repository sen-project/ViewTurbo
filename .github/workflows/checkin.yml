name: Daily Checkin with PushPlus

on:
  schedule:
    - cron: '*/15 * * * *'          # 测试用，每15分钟一次；稳定后可改回 '1 2 * * *'（每天 UTC 02:01，北京时间10:01）
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          echo "=== 步骤：安装 jq ==="
          sudo apt-get update -qq && sudo apt-get install -y jq
          echo "jq 版本: $(jq --version)"
          echo "=== jq 安装完成 ==="

      - name: Check Secrets
        run: |
          echo "=== 步骤：检查 Secrets ==="
          if [ -z "${{ secrets.CHECKIN_TOKEN }}" ]; then
            echo "❌ CHECKIN_TOKEN 未设置"
          else
            echo "✅ CHECKIN_TOKEN 已设置 (长度: ${#${{ secrets.CHECKIN_TOKEN }}})"
          fi

          if [ -z "${{ secrets.PUSHPLUS_TOKEN }}" ]; then
            echo "❌ PUSHPLUS_TOKEN 未设置（微信推送将失败）"
          else
            echo "✅ PUSHPLUS_TOKEN 已设置"
          fi
          echo "=== Secrets 检查完成 ==="

      - name: Send Checkin Request
        id: checkin
        run: |
          echo "=== 步骤：发送签到请求 ==="
          echo "当前时间 (UTC): $(date)"
          echo "当前时间 (北京时间): $(date -d '+8 hours' '+%Y-%m-%d %H:%M:%S')"
          echo ""

          echo "请求 URL: https://api.viewturbo.com/appuser/checkin?...&token=***..."
          echo "请求方法: POST"
          echo ""

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            --max-time 30 \
            -H "User-Agent: Mozilla/5.0" \
            -H "Accept: application/json" \
            -H "Referer: https://www.viewturbo.com/" \
            "https://api.viewturbo.com/appuser/checkin?platform=web&cur_version=0.0.0&token=${{ secrets.CHECKIN_TOKEN }}&lang=hk&code=Others&deviceinfo=" 2>&1)

          CURL_EXIT=$?
          echo "curl 退出码: $CURL_EXIT"

          if [ $CURL_EXIT -ne 0 ]; then
            echo "❌ curl 执行失败，错误码: $CURL_EXIT"
            echo "原始响应: $RESPONSE"
            exit 1
          fi

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo ""
          echo "HTTP 状态码: $HTTP_CODE"
          echo "响应体: $BODY"
          echo ""

          # 解析 msg 和 code
          MSG=$(echo "$BODY" | jq -r '.msg // "无msg字段"' 2>/dev/null)
          CODE=$(echo "$BODY" | jq -r '.code // "无code字段"' 2>/dev/null)

          echo "解析结果:"
          echo " code: $CODE"
          echo " msg: $MSG"
          echo ""

          # 设置输出
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "body=$BODY" >> $GITHUB_OUTPUT
          echo "msg=$MSG" >> $GITHUB_OUTPUT

          # 判断结果
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ 接口通信失败 (HTTP != 200)"
            echo "result=❌ 接口通信失败" >> $GITHUB_OUTPUT
            echo "detail=HTTP状态码: $HTTP_CODE" >> $GITHUB_OUTPUT
            echo "checkin_status=failure" >> $GITHUB_ENV
          elif [ "$CODE" = "0" ]; then
            echo "✅ 签到成功"
            echo "result=✅ 签到成功" >> $GITHUB_OUTPUT
            echo "detail=$MSG" >> $GITHUB_OUTPUT
            echo "checkin_status=success" >> $GITHUB_ENV
          else
            echo "ℹ️ 业务结果: $MSG (code=$CODE)"
            echo "result=ℹ️ $MSG" >> $GITHUB_OUTPUT
            echo "detail=$MSG" >> $GITHUB_OUTPUT
            echo "checkin_status=success" >> $GITHUB_ENV
          fi

          echo "=== 签到请求完成 ==="

      - name: Send Notification via PushPlus
        if: always()
        run: |
          echo "=== 步骤：通过 PushPlus 发送微信通知 ==="

          # 构建标题和内容
          TITLE="签到结果 - $(date +%m月%d日) ${{ steps.checkin.outputs.result }}"

          CONTENT="执行时间: ${{ github.run_started_at }}\n\
          签到状态: ${{ steps.checkin.outputs.result }}\n\
          详细消息: ${{ steps.checkin.outputs.msg }}\n\
          HTTP 状态码: ${{ steps.checkin.outputs.http_code }}\n\
          完整响应: ${{ steps.checkin.outputs.body }}\n\
          查看完整日志: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # 发送到 PushPlus
          RESPONSE=$(curl -s -X POST "http://www.pushplus.plus/send" \
            -d token="${{ secrets.PUSHPLUS_TOKEN }}" \
            -d title="${TITLE}" \
            -d content="${CONTENT}" \
            -d template="txt")

          echo "PushPlus API 响应: $RESPONSE"

          if echo "$RESPONSE" | grep -q '"code":200'; then
            echo "✅ PushPlus 推送成功"
          else
            echo "❌ PushPlus 推送失败，请检查 Token 或网络"
            echo "$RESPONSE"
          fi

          echo "=== 通知发送完成 ==="

      - name: Final Status
        if: always()
        run: |
          echo "=== 最终状态 ==="
          echo "checkin_status: ${{ env.checkin_status }}"
          echo "job 状态: ${{ job.status }}"

          if [ "${{ env.checkin_status }}" = "failure" ]; then
            echo "标记为失败"
            exit 1
          else
            echo "标记为成功"
            exit 0
          fi
