name: Daily Checkin with Email

on:
  schedule:
    - cron: '1 2 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send Checkin Request
        id: checkin
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            --max-time 30 \
            -H "User-Agent: Mozilla/5.0" \
            -H "Accept: application/json" \
            -H "Referer: https://www.viewturbo.com/" \
            "https://api.viewturbo.com/appuser/checkin?platform=web&cur_version=0.0.0&token=${{ secrets.CHECKIN_TOKEN }}&lang=hk&code=Others&deviceinfo=")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "body=$BODY" >> $GITHUB_OUTPUT
          
          # 判断成功与否
          if [ "$HTTP_CODE" = "200" ]; then
            echo "result=✅ 成功" >> $GITHUB_OUTPUT
          else
            echo "result=❌ 失败" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Send Email to QQ
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.QQ_EMAIL }}
          password: ${{ secrets.QQ_EMAIL_AUTH }}
          subject: "【签到】${{ steps.checkin.outputs.result }} - $(date +%m月%d日)"
          to: 2079224061@qq.com
          from: GitHub Actions <${{ secrets.QQ_EMAIL }}>
          html_body: |
            <h2>${{ steps.checkin.outputs.result }}</h2>
            <table border="1" cellpadding="10" style="border-collapse: collapse;">
              <tr><td><b>执行时间</b></td><td>${{ github.run_id }}</td></tr>
              <tr><td><b>HTTP 状态</b></td><td>${{ steps.checkin.outputs.http_code }}</td></tr>
              <tr><td><b>API 返回</b></td><td><pre>${{ steps.checkin.outputs.body }}</pre></td></tr>
            </table>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">查看详细日志</a></p>
